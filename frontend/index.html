<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dagens svenska dagar</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      max-width: 600px;
      width: 90%;
    }

    h1 {
      margin-top: 0;
    }

    .date {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 1rem;
    }

    .section {
      margin-top: 1.5rem;
    }

    .label {
      color: #6b7280;
      font-size: 0.9rem;
      margin-bottom: 0.3rem;
    }

    ul {
      padding-left: 1.2rem;
    }

    .empty {
      color: #6b7280;
    }

    .error {
      display: none;
      background: #fef2f2;
      color: #991b1b;
      padding: 0.8rem;
      border-radius: 8px;
      margin-top: 1rem;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>Dagens svenska dagar</h1>

    <p>
      Den här sidan visar dagens datum och om det finns någon svensk helgdag,
      halvdag eller klämdag.
    </p>

    <div class="section">
      <div class="label">Datum</div>
      <div id="date" class="date">Loading...</div>
    </div>

    <div class="section">
      <div class="label">Helgdagar</div>
      <ul id="holidays"></ul>
    </div>

    <div class="section">
      <div class="label">Halvdagar</div>
      <ul id="halfDays"></ul>
    </div>

    <div class="section">
      <div class="label">Klämdagar</div>
      <ul id="bridgeDays"></ul>
    </div>

    <div id="error" class="error"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
